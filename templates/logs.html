<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs | Agent Monitor</title>
    <meta name="description" content="View detailed brew maintenance events">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* ========================================
           CSS CUSTOM PROPERTIES
           ======================================== */
        :root {
            /* Colors */
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --accent-blue: #00d4ff;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            
            /* Text */
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            /* Glass */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-hover: rgba(255, 255, 255, 0.12);
            
            /* Typography */
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            /* Spacing */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
        }

        /* ========================================
           BASE STYLES
           ======================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            position: relative;
        }

        /* Background Orbs */
        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            top: -300px;
            right: -300px;
            animation: float 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            bottom: -200px;
            left: -200px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* ========================================
           NAVBAR
           ======================================== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(15, 12, 41, 0.8) 0%, rgba(15, 12, 41, 0.4) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: var(--space-md);
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity var(--transition-fast);
        }

        .navbar-brand:hover {
            opacity: 0.85;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.75rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-lg);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            text-decoration: none;
            transition: all var(--transition-normal);
            min-height: 44px;
            cursor: pointer;
        }

        .btn-back:hover {
            background: var(--glass-hover);
            border-color: var(--accent-purple);
        }

        /* ========================================
           MAIN CONTENT
           ======================================== */
        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-2xl) var(--space-lg);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: var(--space-sm);
        }

        /* ========================================
           FILTER BUTTONS
           ======================================== */
        .filter-bar {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-sm) var(--space-md);
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: var(--radius-full);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-normal);
            min-height: 40px;
        }

        .filter-btn:hover {
            background: var(--glass-hover);
            color: var(--text-primary);
            border-color: var(--accent-purple);
        }

        .filter-btn:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-color: transparent;
            color: white;
        }

        .filter-btn i {
            font-size: 0.8rem;
        }

        /* ========================================
           EVENTS CONTAINER
           ======================================== */
        .events-container {
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
        }

        /* ========================================
           EVENT CARD
           ======================================== */
        .event-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            animation: slideIn 0.3s ease-out backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-card:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        /* Event Header (Collapsed View) */
        .event-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-lg);
            cursor: pointer;
            user-select: none;
        }

        .event-header:hover {
            background: var(--glass-hover);
        }

        .event-header-content {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
            flex: 1;
        }

        .event-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .event-status-badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .event-status-badge.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .event-status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .event-info {
            flex: 1;
        }

        .event-title {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
        }

        .event-trigger {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .event-summary {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .event-meta {
            display: flex;
            gap: var(--space-md);
            margin-top: var(--space-sm);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .event-meta-item {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .event-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            background: var(--glass-hover);
            color: var(--accent-blue);
            border: 1px solid var(--glass-border);
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .event-card.expanded .event-toggle {
            transform: rotate(180deg);
        }

        /* Event Body (Expanded View) */
        .event-body {
            display: none;
            padding: 0 var(--space-lg) var(--space-lg);
            border-top: 1px solid var(--glass-border);
        }

        .event-card.expanded .event-body {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stages Accordion */
        .stages-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .stage-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .stage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md);
            cursor: pointer;
            user-select: none;
        }

        .stage-header:hover {
            background: var(--glass-hover);
        }

        .stage-header-content {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex: 1;
        }

        .stage-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 600;
            font-size: 1rem;
        }

        .stage-status-badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .stage-status-badge.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .stage-status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .stage-info {
            flex: 1;
        }

        .stage-name {
            font-family: var(--font-heading);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stage-summary {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: var(--space-xs);
        }

        .stage-duration {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-blue);
            white-space: nowrap;
        }

        .stage-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            color: var(--accent-blue);
            transition: transform var(--transition-fast);
            flex-shrink: 0;
        }

        .stage-item.expanded .stage-toggle {
            transform: rotate(180deg);
        }

        /* Stage Details (Raw Output) */
        .stage-body {
            display: none;
            padding: var(--space-md);
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
        }

        .stage-item.expanded .stage-body {
            display: block;
        }

        .stage-raw-output {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            padding: var(--space-md);
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
        }

        /* ========================================
           EMPTY & LOADING STATES
           ======================================== */
        .empty-state, .loading-state {
            text-align: center;
            padding: var(--space-2xl);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
        }

        .empty-state i, .loading-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: var(--space-md);
            opacity: 0.5;
        }

        .empty-state h3, .loading-state h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--space-md);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================================
           ERROR STATES
           ======================================== */
        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-md);
            padding: var(--space-md) var(--space-lg);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            color: var(--error);
        }

        .error-banner button {
            margin-left: auto;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 767px) {
            :root {
                font-size: 15px;
            }

            main {
                padding: var(--space-xl) var(--space-md);
            }

            .navbar-content {
                flex-direction: column;
                gap: var(--space-sm);
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn-back {
                flex: 1;
                justify-content: center;
            }

            .filter-bar {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: var(--space-sm);
                -webkit-overflow-scrolling: touch;
            }

            .filter-btn {
                white-space: nowrap;
            }

            .event-header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md);
            }

            .event-meta {
                flex-wrap: wrap;
            }
        }

        @supports (padding: max(0px)) {
            .navbar {
                padding-left: max(var(--space-md), env(safe-area-inset-left));
                padding-right: max(var(--space-md), env(safe-area-inset-right));
            }

            main {
                padding-left: max(var(--space-lg), env(safe-area-inset-left));
                padding-right: max(var(--space-lg), env(safe-area-inset-right));
                padding-bottom: max(var(--space-2xl), env(safe-area-inset-bottom));
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-purple);
            color: white;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-sm);
            z-index: 10000;
            font-weight: 600;
            transition: top var(--transition-fast);
        }

        .skip-link:focus {
            top: var(--space-md);
        }
    </style>
</head>
<body>
    <!-- Skip Link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Background Orbs -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-content">
            <a href="/" class="navbar-brand" aria-label="Agent Monitor Home">
                <i class="bi bi-robot"></i>
                <span>Agent Monitor</span>
            </a>
            <a href="/" class="btn-back" aria-label="Back to dashboard">
                <i class="bi bi-arrow-left"></i>
                <span>Back to Dashboard</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" role="main">
        <header class="page-header">
            <h1 class="page-title">Brew Maintenance Events</h1>
            <div class="header-actions">
                <button class="btn-back" onclick="refreshEvents()" aria-label="Refresh events">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </header>

        <!-- Filter Buttons -->
        <div class="filter-bar" role="group" aria-label="Filter events by status">
            <button class="filter-btn active" data-filter="all" onclick="filterEvents('all')" aria-pressed="true">
                <i class="bi bi-collection"></i>
                All
            </button>
            <button class="filter-btn" data-filter="success" onclick="filterEvents('success')" aria-pressed="false">
                <i class="bi bi-check-circle"></i>
                Success
            </button>
            <button class="filter-btn" data-filter="failed" onclick="filterEvents('failed')" aria-pressed="false">
                <i class="bi bi-x-circle"></i>
                Failed
            </button>
            <button class="filter-btn" data-filter="warning" onclick="filterEvents('warning')" aria-pressed="false">
                <i class="bi bi-exclamation-triangle"></i>
                Warnings
            </button>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="error-banner" style="display: none;" role="alert" aria-live="polite">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="error-message">Unable to load events.</span>
            <button class="btn-back" onclick="refreshEvents()" aria-label="Retry">
                <i class="bi bi-arrow-clockwise"></i>
                Retry
            </button>
        </div>

        <!-- Events Container -->
        <div id="events-container" class="events-container" role="region" aria-live="polite" aria-label="Event entries">
            <div class="loading-state">
                <div class="spinner" role="status" aria-label="Loading"></div>
                <h3>Loading events...</h3>
            </div>
        </div>
    </main>

    <script>
        /* ========================================
           STATE
           ======================================== */
        let allEvents = [];
        let currentFilter = 'all';
        let expandedEvents = new Set();
        let expandedStages = new Set();

        /* ========================================
           FILTER FUNCTION
           ======================================== */
        function filterEvents(status) {
            currentFilter = status;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.filter === status;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-pressed', isActive);
            });
            
            renderEvents();
        }

        /* ========================================
           EVENT EXPANSION
           ======================================== */
        function toggleEventExpanded(eventId) {
            const card = document.querySelector(`[data-event-id="${eventId}"]`);
            if (!card) return;
            
            card.classList.toggle('expanded');
            
            if (card.classList.contains('expanded')) {
                expandedEvents.add(eventId);
            } else {
                expandedEvents.delete(eventId);
            }
        }

        function toggleStageExpanded(eventId, stageIndex) {
            const stage = document.querySelector(`[data-event-id="${eventId}"][data-stage="${stageIndex}"]`);
            if (!stage) return;
            
            const stageKey = `${eventId}-${stageIndex}`;
            
            stage.classList.toggle('expanded');
            
            if (stage.classList.contains('expanded')) {
                expandedStages.add(stageKey);
            } else {
                expandedStages.delete(stageKey);
            }
        }

        /* ========================================
           FORMAT UTILITIES
           ======================================== */
        function formatDuration(seconds) {
            if (seconds < 60) return `${seconds}s`;
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes}m ${secs}s`;
        }

        function formatTimestamp(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function getStatusIcon(status) {
            const icons = {
                'success': '<i class="bi bi-check-circle-fill"></i>',
                'failed': '<i class="bi bi-x-circle-fill"></i>',
                'warning': '<i class="bi bi-exclamation-circle-fill"></i>'
            };
            return icons[status] || icons['success'];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /* ========================================
           RENDER EVENTS
           ======================================== */
        function renderEvents() {
            const container = document.getElementById('events-container');
            
            // Filter events
            let filteredEvents = allEvents;
            if (currentFilter !== 'all') {
                filteredEvents = allEvents.filter(event => event.status === currentFilter);
            }

            if (filteredEvents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h3>No ${currentFilter === 'all' ? '' : currentFilter + ' '}Events Found</h3>
                        <p>Events will appear here when brew maintenance runs.</p>
                    </div>
                `;
                return;
            }

            // Render event cards
            container.innerHTML = filteredEvents.map((event, index) => `
                <div class="event-card ${expandedEvents.has(event.id) ? 'expanded' : ''}" 
                     data-event-id="${event.id}" 
                     style="animation-delay: ${index * 30}ms"
                     role="article" 
                     aria-label="Event: ${event.name} - ${event.status}">
                    
                    <!-- Event Header (Collapsed View) -->
                    <div class="event-header" onclick="toggleEventExpanded('${event.id}')">
                        <div class="event-header-content">
                            <div class="event-status-badge ${event.status}">
                                ${getStatusIcon(event.status)}
                            </div>
                            <div class="event-info">
                                <div class="event-title">
                                    ${escapeHtml(event.name)}
                                    <span class="event-trigger" style="font-weight: normal;">from ${escapeHtml(event.trigger)}</span>
                                </div>
                                <div class="event-summary">
                                    ${escapeHtml(event.overall_summary)}
                                </div>
                                <div class="event-meta">
                                    <div class="event-meta-item">
                                        <i class="bi bi-clock"></i>
                                        <span>${formatDuration(event.duration_seconds)}</span>
                                    </div>
                                    <div class="event-meta-item">
                                        <i class="bi bi-calendar"></i>
                                        <span>${formatTimestamp(event.timestamp)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="event-toggle">
                            <i class="bi bi-chevron-down"></i>
                        </div>
                    </div>
                    
                    <!-- Event Body (Expanded View) -->
                    <div class="event-body">
                        <div class="stages-list">
                            ${event.stages.map((stage, stageIndex) => {
                                const stageKey = `${event.id}-${stageIndex}`;
                                const isExpanded = expandedStages.has(stageKey);
                                return `
                                <div class="stage-item ${isExpanded ? 'expanded' : ''}" data-event-id="${event.id}" data-stage="${stageIndex}">
                                    <div class="stage-header" onclick="toggleStageExpanded('${event.id}', ${stageIndex})">
                                        <div class="stage-header-content">
                                            <div class="stage-status-badge ${stage.status}">
                                                ${getStatusIcon(stage.status)}
                                            </div>
                                            <div class="stage-info">
                                                <div class="stage-name">${escapeHtml(stage.name)}</div>
                                                <div class="stage-summary">${escapeHtml(stage.summary)}</div>
                                            </div>
                                        </div>
                                        <div class="stage-duration">${formatDuration(stage.duration_seconds)}</div>
                                        <div class="stage-toggle">
                                            <i class="bi bi-chevron-down"></i>
                                        </div>
                                    </div>
                                    <div class="stage-body">
                                        <div class="stage-raw-output">${stage.raw_output ? escapeHtml(stage.raw_output) : '<em style="color: var(--text-secondary)">No output</em>'}</div>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /* ========================================
           FETCH EVENTS
           ======================================== */
        async function fetchEvents() {
            try {
                // Check for demo parameter in query string
                const demoParam = new URLSearchParams(window.location.search).get('demo');
                const apiUrl = demoParam === 'true' ? '/api/logs?view=events&demo=true' : '/api/logs?view=events';
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Cache
                localStorage.setItem('cachedEvents', JSON.stringify(data));
                
                allEvents = data.events || [];
                renderEvents();
                
                // Hide error
                document.getElementById('error-banner').style.display = 'none';
                
            } catch (error) {
                console.error('Failed to fetch events:', error);
                
                // Try cache
                const cached = localStorage.getItem('cachedEvents');
                if (cached) {
                    try {
                        const data = JSON.parse(cached);
                        allEvents = data.events || [];
                        renderEvents();
                    } catch (e) {
                        showError();
                    }
                } else {
                    showError();
                }
            }
        }

        function showError() {
            document.getElementById('error-banner').style.display = 'flex';
            document.getElementById('events-container').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-exclamation-triangle"></i>
                    <h3>Unable to Load Events</h3>
                    <p>Please check your connection and try again.</p>
                </div>
            `;
        }

        function refreshEvents() {
            fetchEvents();
        }

        /* ========================================
           INITIALIZATION
           ======================================== */
        function init() {
            // Try cache first
            const cached = localStorage.getItem('cachedEvents');
            if (cached) {
                try {
                    const data = JSON.parse(cached);
                    allEvents = data.events || [];
                    renderEvents();
                } catch (e) {}
            }

            // Fetch fresh
            fetchEvents();

            // Auto-refresh every 10 seconds
            setInterval(fetchEvents, 10000);
        }

        // Check for URL filter param
        const urlParams = new URLSearchParams(window.location.search);
        const agentFilter = urlParams.get('agent');
        
        if (agentFilter) {
            // Could filter by agent name here
        }

        init();
    </script>
</body>
</html>
