<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Monitor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.3) !important;
            backdrop-filter: blur(10px);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .status-success {
            color: #28a745;
        }
        .status-failure {
            color: #dc3545;
        }
        .status-running {
            color: #0dcaf0;
        }
        .badge-success {
            background-color: #28a745;
        }
        .badge-failure {
            background-color: #dc3545;
        }
        .badge-running {
            background-color: #0dcaf0;
        }
        .agent-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .last-run {
            font-size: 0.85rem;
            color: #888;
        }
        .refresh-indicator {
            font-size: 0.8rem;
            color: #666;
        }
        .section-title {
            font-size: 1rem;
            color: #888;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .external-link-icon {
            font-size: 0.75rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-robot me-2"></i>Agent Monitor
            </a>
            <span class="refresh-indicator">
                <i class="bi bi-arrow-clockwise me-1"></i>Auto-refresh: 10s
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h2 class="mb-3">
                    <i class="bi bi-grid-3x3-gap me-2"></i>Agent Status
                </h2>
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-light" onclick="refreshAgents()">
                    <i class="bi bi-arrow-clockwise me-1"></i>Refresh Now
                </button>
            </div>
        </div>

        <div id="agents-container" class="row g-4">
            <div class="col-12 text-center">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col text-center">
                <a href="/logs" class="btn btn-primary btn-lg">
                    <i class="bi bi-journal-text me-2"></i>View All Logs
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let autoRefreshInterval;

        function createAgentCard(agent) {
            let statusClass, badgeClass;
            
            if (agent.status === 'success') {
                statusClass = 'status-success';
                badgeClass = 'badge-success';
            } else if (agent.status === 'failure') {
                statusClass = 'status-failure';
                badgeClass = 'badge-failure';
            } else {
                statusClass = 'status-running';
                badgeClass = 'badge-running';
            }
            
            const icon = agent.icon || (agent.status === 'success' ? 'bi-check-circle-fill' : 'bi-x-circle-fill');
            const link = agent.link || '/logs?agent=' + encodeURIComponent(agent.name);
            const isExternal = agent.link && agent.link.startsWith('http');
            const clickHandler = isExternal 
                ? `onclick="window.open('${agent.link}', '_blank')"` 
                : `onclick="window.location.href='${link}'"`;
            
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100" ${clickHandler} style="cursor: pointer;">
                        <div class="card-body text-center">
                            <div class="agent-icon">
                                <span>${icon}</span>
                            </div>
                            <h5 class="card-title">${agent.name}${isExternal ? '<i class="bi bi-box-arrow-up-right external-link-icon"></i>' : ''}</h5>
                            <span class="badge ${badgeClass}">${agent.status.toUpperCase()}</span>
                            <p class="card-text mt-3">
                                <small class="last-run">
                                    <i class="bi bi-clock me-1"></i>Last Run:<br>
                                    ${agent.last_run || 'N/A'}
                                </small>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function refreshAgents() {
            try {
                const response = await fetch('/api/agents');
                const agents = await response.json();
                
                const container = document.getElementById('agents-container');
                
                if (agents.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center">
                            <p class="text-muted">No agents found. Check logs for more information.</p>
                        </div>
                    `;
                    return;
                }
                
                // Group agents by type
                const systemAgents = agents.filter(a => a.type === 'system' || !a.type);
                const aiAgents = agents.filter(a => a.type === 'ai');
                
                let html = '';
                
                if (systemAgents.length > 0) {
                    html += '<div class="col-12"><h5 class="section-title"><i class="bi bi-terminal me-2"></i>System Agents</h5></div>';
                    html += systemAgents.map(createAgentCard).join('');
                }
                
                if (aiAgents.length > 0) {
                    html += '<div class="col-12"><h5 class="section-title"><i class="bi bi-robot me-2"></i>AI Agents</h5></div>';
                    html += aiAgents.map(createAgentCard).join('');
                }
                
                container.innerHTML = html;
            } catch (error) {
                console.error('Error fetching agents:', error);
                document.getElementById('agents-container').innerHTML = `
                    <div class="col-12 text-center text-danger">
                        <p>Error loading agents. Please try again.</p>
                    </div>
                `;
            }
        }

        // Initial load
        refreshAgents();

        // Auto-refresh every 10 seconds
        autoRefreshInterval = setInterval(refreshAgents, 10000);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            clearInterval(autoRefreshInterval);
        });
    </script>
</body>
</html>
