version: 2
updates:
  # Keep Python dependencies up to date (requirements.txt + requirements-dev.txt)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    assignees:
      - philo-meerman
    labels:
      - dependencies
      - python

  # Keep GitHub Actions versions up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    assignees:
      - philo-meerman
    labels:
      - dependencies
      - github-actions
