name: Upgrade Agent - On Vulnerability Alert

on:
  workflow_dispatch:
  repository_dispatch:
    types: [vulnerability-detected]
  dependabot_alert:
    types: [created]

jobs:
  upgrade:
    name: Run Upgrade Agent
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run upgrade agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          TRIGGER_TYPE: ${{ github.event_name == 'dependabot_alert' && 'webhook' || 'manual' }}
        run: |
          python run-upgrade-agent.py

      - name: Report status
        if: always()
        run: |
          echo "Upgrade agent completed"
